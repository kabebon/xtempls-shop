services:
  postgres:
    image: postgres:16-alpine
    container_name: xtempls_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xtempls_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xtempls_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - xtempls_network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health',timeout=5).status==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: xtempls_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    networks:
      - xtempls_network
    healthcheck:
      test: ["CMD-SHELL", "test -d /proc/1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    container_name: xtempls_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/app:ro
      - ./admin:/usr/share/nginx/html/admin:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
    networks:
      - xtempls_network

volumes:
  postgres_data:
  uploads_data:

networks:
  xtempls_network:
    driver: bridge
