<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTEMPLS Admin — Товары</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">XTEMPLS</div>
    <div class="sidebar-label">Навигация</div>
    <a class="nav-item" href="dashboard.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Дашборд
    </a>
    <a class="nav-item active" href="products.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Товары
    </a>
    <a class="nav-item" href="categories.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
      </svg>
      Категории
    </a>
    <a class="nav-item" href="orders.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      Заказы
    </a>
    <a class="nav-item" href="users.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Администраторы
    </a>
    <div class="sidebar-bottom">
      <div class="admin-badge">
        <div class="admin-avatar" id="adminInitial">A</div>
        <div>
          <div class="admin-name" id="adminLogin">Admin</div>
          <div class="admin-role">Администратор</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Товары</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input class="search-input" type="search" id="searchInput" placeholder="Поиск товаров..." />
        <button class="btn btn-primary" id="addProductBtn" onclick="openProductModal()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Добавить
        </button>
      </div>
    </div>

    <div class="page-content" style="padding:0;">
      <div class="table-card" style="border-radius:0;border-left:none;border-right:none;border-bottom:none;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Цена</th>
                <th>Наличие</th>
                <th>Активен</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:40px">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Добавить товар</div>
      <button class="modal-close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="productForm">
        <input type="hidden" id="productId" />

        <div class="form-grid">
          <div class="form-group full">
            <label class="form-label">Название *</label>
            <input class="form-input" type="text" id="fName" required placeholder="Название товара" />
          </div>
          <div class="form-group full">
            <label class="form-label">Slug (URL) *</label>
            <input class="form-input" type="text" id="fSlug" required placeholder="nazvanie-tovara" />
          </div>
          <div class="form-group">
            <label class="form-label">Цена (₽) *</label>
            <input class="form-input" type="number" id="fPrice" required min="0" step="0.01" placeholder="2990" />
          </div>
          <div class="form-group">
            <label class="form-label">Старая цена (₽)</label>
            <input class="form-input" type="number" id="fOldPrice" min="0" step="0.01" placeholder="4990" />
          </div>
          <div class="form-group">
            <label class="form-label">Категория</label>
            <select class="form-select" id="fCategory">
              <option value="">— Без категории —</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Наличие</label>
            <select class="form-select" id="fStock">
              <option value="in_stock">В наличии</option>
              <option value="out_of_stock">Нет в наличии</option>
              <option value="preorder">Предзаказ</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;gap:16px;flex-direction:row;align-items:center;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
              <input type="checkbox" id="fActive" checked /> Активен
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;font-weight:600;">
              <input type="checkbox" id="fFeatured" /> Новинка ⭐
            </label>
          </div>
          <div class="form-group">
            <label class="form-label">Сортировка</label>
            <input class="form-input" type="number" id="fSort" value="0" />
          </div>
          <div class="form-group full">
            <label class="form-label">Описание</label>
            <textarea class="form-textarea" id="fDesc" placeholder="Описание товара..."></textarea>
          </div>
        </div>

        <!-- Sizes -->
        <div style="margin-top:16px;">
          <div class="form-label" style="margin-bottom:8px;">Размеры</div>
          <div class="sizes-editor" id="sizesEditor"></div>
          <div class="size-add-row">
            <input class="form-input" style="width:120px;" type="text" id="sizeInput" placeholder="S, M, L, XL..." />
            <button type="button" class="btn btn-secondary" onclick="addSize()">+ Добавить</button>
          </div>
        </div>
      </form>

      <!-- Images (shown after product is created) -->
      <div id="imagesSection" style="margin-top:20px;display:none;">
        <div style="border-top:1px solid var(--border);padding-top:20px;">
          <div class="form-label" style="margin-bottom:12px;">Фотографии</div>
          <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-label">Нажмите или перетащите фото</div>
            <div class="upload-sub">JPG, PNG, WEBP — до 20MB каждый</div>
            <input type="file" id="fileInput" multiple accept="image/*" style="display:none;" />
          </div>
          <div class="images-preview" id="imagesPreview"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeProductModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveProduct()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Сохранить
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  requireAuth();
  loadAdminInfo();

  let categories = [];
  let currentPage = 1;
  let totalPages = 1;
  let searchTimeout = null;
  let editingProductId = null;
  let currentSizes = [];
  let productImages = [];

  // Load categories for select
  async function loadCategories() {
    const res = await apiFetch('/api/admin/categories');
    if (!res.ok) return;
    categories = await res.json();
    const sel = document.getElementById('fCategory');
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }

  // Load products table
  async function loadProducts() {
    const search = document.getElementById('searchInput').value.trim();
    const params = new URLSearchParams({ page: currentPage, per_page: 20 });
    if (search) params.append('search', search);

    const res = await apiFetch(`/api/admin/products?${params}`);
    if (!res.ok) return;
    const data = await res.json();
    totalPages = data.pages;

    const tbody = document.getElementById('productsTable');
    if (data.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:40px">Нет товаров</td></tr>';
    } else {
      tbody.innerHTML = data.items.map(p => `
        <tr>
          <td>
            ${p.primary_image
              ? `<img src="${p.primary_image}" class="product-thumb" />`
              : `<div class="product-thumb-placeholder">🛍</div>`}
          </td>
          <td>
            <div style="font-weight:600">${p.name}</div>
            <div style="font-size:11px;color:var(--text-muted)">${p.slug}</div>
          </td>
          <td>${categories.find(c => c.id === p.category_id)?.name || '—'}</td>
          <td>
            <div style="font-weight:700;color:var(--accent)">${fmt(p.price)}</div>
          </td>
          <td>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
              <button class="stock-btn ${p.stock_status === 'in_stock' ? 'badge badge-green' : 'badge badge-gray'}"
                onclick="quickStock(${p.id}, 'in_stock', this)">В нал.</button>
              <button class="stock-btn ${p.stock_status === 'out_of_stock' ? 'badge badge-red' : 'badge badge-gray'}"
                onclick="quickStock(${p.id}, 'out_of_stock', this)">Нет</button>
              <button class="stock-btn ${p.stock_status === 'preorder' ? 'badge badge-yellow' : 'badge badge-gray'}"
                onclick="quickStock(${p.id}, 'preorder', this)">Предзак.</button>
            </div>
          </td>
          <td>${p.is_active !== false
            ? '<span class="badge badge-green">Да</span>'
            : '<span class="badge badge-gray">Нет</span>'}</td>
          <td>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-secondary btn-icon" onclick="editProduct(${p.id})" title="Редактировать">
                ✏️
              </button>
              <button class="btn btn-danger btn-icon" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')" title="Удалить">
                🗑
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Pagination
    renderPagination();
  }

  function renderPagination() {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 3) {
        html += `<span style="color:var(--text-muted);padding:0 4px">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pag.innerHTML = html;
  }

  window.goPage = function(p) {
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadProducts();
  };

  // Quick stock update
  window.quickStock = async function(id, status, btn) {
    const res = await apiFetch(`/api/admin/products/${id}/stock`, {
      method: 'PUT',
      body: JSON.stringify({ stock_status: status })
    });
    if (res.ok) {
      showToast('Наличие обновлено', 'success');
      loadProducts();
    } else {
      showToast('Ошибка', 'error');
    }
  };

  // Open modal to add
  window.openProductModal = function() {
    editingProductId = null;
    currentSizes = [];
    document.getElementById('modalTitle').textContent = 'Добавить товар';
    document.getElementById('productForm').reset();
    document.getElementById('fActive').checked = true;
    document.getElementById('fFeatured').checked = false;
    document.getElementById('fSort').value = '0';
    document.getElementById('productId').value = '';
    document.getElementById('imagesSection').style.display = 'none';
    renderSizes();
    document.getElementById('productModal').classList.add('open');
  };

  window.closeProductModal = function() {
    document.getElementById('productModal').classList.remove('open');
  };

  // Auto-slug from name
  document.getElementById('fName').addEventListener('input', function() {
    if (!editingProductId) {
      document.getElementById('fSlug').value = this.value
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^\w-]/g, '')
        .replace(/-+/g, '-');
    }
  });

  // Sizes
  function renderSizes() {
    const editor = document.getElementById('sizesEditor');
    editor.innerHTML = currentSizes.map(s => `
      <div class="size-tag">
        ${s}
        <button class="size-tag-del" onclick="removeSize('${s}')">×</button>
      </div>
    `).join('');
  }

  window.addSize = function() {
    const input = document.getElementById('sizeInput');
    const val = input.value.trim().toUpperCase();
    if (val && !currentSizes.includes(val)) {
      currentSizes.push(val);
      renderSizes();
    }
    input.value = '';
    input.focus();
  };

  window.removeSize = function(s) {
    currentSizes = currentSizes.filter(x => x !== s);
    renderSizes();
  };

  document.getElementById('sizeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addSize(); }
  });

  // Save product
  window.saveProduct = async function() {
    const id = document.getElementById('productId').value;
    const body = {
      name: document.getElementById('fName').value.trim(),
      slug: document.getElementById('fSlug').value.trim(),
      price: parseFloat(document.getElementById('fPrice').value),
      old_price: document.getElementById('fOldPrice').value || null,
      category_id: document.getElementById('fCategory').value || null,
      stock_status: document.getElementById('fStock').value,
      is_active: document.getElementById('fActive').checked,
      is_featured: document.getElementById('fFeatured').checked,
      sort_order: parseInt(document.getElementById('fSort').value) || 0,
      description: document.getElementById('fDesc').value.trim() || null,
      sizes: currentSizes,
    };

    if (!body.name || !body.slug || !body.price) {
      showToast('Заполните обязательные поля', 'error');
      return;
    }

    const url = id ? `/api/admin/products/${id}` : '/api/admin/products';
    const method = id ? 'PUT' : 'POST';

    const res = await apiFetch(url, { method, body: JSON.stringify(body) });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showToast(err.detail || 'Ошибка сохранения', 'error');
      return;
    }

    const product = await res.json();
    editingProductId = product.id;
    document.getElementById('productId').value = product.id;
    document.getElementById('imagesSection').style.display = 'block';
    document.getElementById('modalTitle').textContent = 'Редактировать товар';

    showToast(id ? 'Товар обновлён' : 'Товар создан', 'success');
    loadProducts();
    renderProductImages(product.images || []);
  };

  // Edit product
  window.editProduct = async function(id) {
    const res = await apiFetch(`/api/admin/products/${id}`);
    if (!res.ok) { showToast('Ошибка загрузки', 'error'); return; }
    const p = await res.json();

    editingProductId = id;
    currentSizes = (p.sizes || []).sort((a,b) => a.sort_order - b.sort_order).map(s => s.size);

    document.getElementById('modalTitle').textContent = 'Редактировать товар';
    document.getElementById('productId').value = p.id;
    document.getElementById('fName').value = p.name;
    document.getElementById('fSlug').value = p.slug;
    document.getElementById('fPrice').value = p.price;
    document.getElementById('fOldPrice').value = p.old_price || '';
    document.getElementById('fCategory').value = p.category_id || '';
    document.getElementById('fStock').value = p.stock_status;
    document.getElementById('fActive').checked = p.is_active;
    document.getElementById('fFeatured').checked = p.is_featured;
    document.getElementById('fSort').value = p.sort_order;
    document.getElementById('fDesc').value = p.description || '';

    renderSizes();

    document.getElementById('imagesSection').style.display = 'block';
    renderProductImages(p.images || []);
    document.getElementById('productModal').classList.add('open');
  };

  // Render product images in modal
  function renderProductImages(images) {
    productImages = images;
    const preview = document.getElementById('imagesPreview');
    preview.innerHTML = images
      .sort((a,b) => (b.is_primary?1:0) - (a.is_primary?1:0) || a.sort_order - b.sort_order)
      .map(img => `
        <div class="img-thumb ${img.is_primary ? 'primary' : ''}" title="${img.is_primary ? 'Главное фото' : 'Нажмите чтобы сделать главным'}"
          onclick="setPrimaryImage(${img.id})">
          <img src="${img.url}" alt="" />
          <button class="img-thumb-del" onclick="event.stopPropagation();deleteImage(${img.id})">✕</button>
        </div>
      `).join('');
  }

  // Upload image
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');

  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    uploadFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

  async function uploadFiles(files) {
    const id = document.getElementById('productId').value;
    if (!id) { showToast('Сначала сохраните товар', 'error'); return; }

    for (const file of files) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('is_primary', productImages.length === 0 ? 'true' : 'false');

      const res = await apiFetch(`/api/admin/products/${id}/images`, {
        method: 'POST',
        body: fd
      });

      if (res.ok) {
        showToast('Фото загружено', 'success');
        // Reload images
        const pRes = await apiFetch(`/api/admin/products/${id}`);
        if (pRes.ok) {
          const p = await pRes.json();
          renderProductImages(p.images || []);
        }
      } else {
        showToast('Ошибка загрузки фото', 'error');
      }
    }
    fileInput.value = '';
  }

  window.deleteImage = async function(imgId) {
    const res = await apiFetch(`/api/admin/images/${imgId}`, { method: 'DELETE' });
    if (res.ok || res.status === 204) {
      productImages = productImages.filter(i => i.id !== imgId);
      renderProductImages(productImages);
      showToast('Фото удалено', 'success');
      loadProducts();
    }
  };

  window.setPrimaryImage = async function(imgId) {
    const id = document.getElementById('productId').value;
    if (!id) return;
    const res = await apiFetch(`/api/admin/images/${imgId}/primary?product_id=${id}`, { method: 'PUT' });
    if (res.ok) {
      productImages = productImages.map(i => ({ ...i, is_primary: i.id === imgId }));
      renderProductImages(productImages);
      loadProducts();
    }
  };

  // Delete product
  window.deleteProduct = function(id, name) {
    const confirmed = confirm(`Удалить товар "${name}"?\n\nЭто действие нельзя отменить.`);
    if (!confirmed) return;
    apiFetch(`/api/admin/products/${id}`, { method: 'DELETE' }).then(res => {
      if (res.ok || res.status === 204) {
        showToast('Товар удалён', 'success');
        loadProducts();
      } else {
        showToast('Ошибка удаления', 'error');
      }
    });
  };

  // Search
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      currentPage = 1;
      loadProducts();
    }, 400);
  });

  // Close modal on overlay click
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeProductModal();
  });

  // Init
  (async () => {
    await loadCategories();
    await loadProducts();
  })();
</script>
</body>
</html>
