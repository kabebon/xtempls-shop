<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTEMPLS Admin — Промокоды</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">XTEMPLS</div>
    <div class="sidebar-label">Навигация</div>
    <a class="nav-item" href="dashboard.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Дашборд
    </a>
    <a class="nav-item" href="products.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Товары
    </a>
    <a class="nav-item" href="categories.html">Категории</a>
    <a class="nav-item" href="orders.html">Заказы</a>
    <a class="nav-item" href="trash.html">Корзина</a>
    <a class="nav-item active" href="promo.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M7 7h.01M7 3h5l7 7-7 7-7-7V7a4 4 0 014-4z"/>
      </svg>
      Промокоды
    </a>
    <a class="nav-item" href="users.html">Администраторы</a>
    <div class="sidebar-bottom">
      <div class="admin-badge">
        <div class="admin-avatar" id="adminInitial">A</div>
        <div>
          <div class="admin-name" id="adminLogin">Admin</div>
          <div class="admin-role">Администратор</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Промокоды</div>
      <button class="btn btn-primary" onclick="openCreateModal()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Новый промокод
      </button>
    </div>

    <div class="page-body">
      <div class="card" style="overflow-x:auto;">
        <table class="promo-table" id="promoTable">
          <thead>
            <tr>
              <th>Код</th>
              <th>Скидка</th>
              <th>Статус</th>
              <th>Использований</th>
              <th>Лимит</th>
              <th>Истекает</th>
              <th>Создан</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="promoBody">
            <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal-content" style="max-width:480px;">
    <div class="modal-header">
      <div class="modal-title">Новый промокод</div>
      <button class="modal-close" onclick="closeCreateModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Код промокода *</label>
        <input type="text" class="form-input" id="fCode" placeholder="SUMMER10" />
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Автоматически переводится в верхний регистр</div>
      </div>
      <div class="form-group">
        <label class="form-label">Скидка (%) *</label>
        <input type="number" class="form-input" id="fDiscount" min="1" max="100" placeholder="10" />
      </div>
      <div class="form-group">
        <label class="form-label">Лимит использований (пусто = без лимита)</label>
        <input type="number" class="form-input" id="fLimit" min="1" placeholder="100" />
      </div>
      <div class="form-group">
        <label class="form-label">Срок действия до (необязательно)</label>
        <input type="datetime-local" class="form-input" id="fExpires" />
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="fActive" checked style="width:16px;height:16px;" />
        <label for="fActive" class="form-label" style="margin:0;">Активен сразу</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCreateModal()">Отмена</button>
      <button class="btn btn-primary" onclick="createPromo()">Создать</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  requireAuth();
  loadAdminInfo();

  async function loadPromos() {
    const res = await apiFetch('/api/admin/promo-codes');
    if (!res.ok) {
      document.getElementById('promoBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);">Ошибка загрузки</td></tr>';
      return;
    }
    const promos = await res.json();
    const tbody = document.getElementById('promoBody');
    if (!promos.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">Промокодов пока нет</td></tr>';
      return;
    }
    tbody.innerHTML = promos.map(p => `
      <tr>
        <td><strong style="font-size:15px;letter-spacing:0.05em;">${p.code}</strong></td>
        <td><span style="font-weight:700;color:var(--accent);">-${p.discount_percent}%</span></td>
        <td>${p.is_active ? '<span class="promo-badge-active">✓ Активен</span>' : '<span class="promo-badge-inactive">✗ Отключён</span>'}</td>
        <td>${p.used_count}</td>
        <td>${p.usage_limit ?? '∞'}</td>
        <td>${p.expires_at ? new Date(p.expires_at).toLocaleDateString('ru-RU') : '—'}</td>
        <td style="color:var(--text-muted);font-size:12px;">${new Date(p.created_at).toLocaleDateString('ru-RU')}</td>
        <td>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px;" onclick="togglePromo(${p.id})">${p.is_active ? 'Отключить' : 'Включить'}</button>
            <button class="btn btn-danger" style="padding:5px 10px;font-size:12px;" onclick="deletePromo(${p.id}, '${p.code}')">Удалить</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  window.togglePromo = async function(id) {
    const res = await apiFetch('/api/admin/promo-codes/' + id + '/toggle', { method: 'PATCH' });
    if (res.ok) { loadPromos(); showToast('Статус изменён', 'success'); }
    else showToast('Ошибка', 'error');
  };

  window.deletePromo = async function(id, code) {
    if (!confirm('Удалить промокод "' + code + '"?')) return;
    const res = await apiFetch('/api/admin/promo-codes/' + id, { method: 'DELETE' });
    if (res.ok || res.status === 204) { loadPromos(); showToast('Промокод удалён', 'success'); }
    else showToast('Ошибка удаления', 'error');
  };

  window.openCreateModal = function() {
    document.getElementById('fCode').value = '';
    document.getElementById('fDiscount').value = '';
    document.getElementById('fLimit').value = '';
    document.getElementById('fExpires').value = '';
    document.getElementById('fActive').checked = true;
    document.getElementById('createModal').classList.add('open');
  };
  window.closeCreateModal = function() {
    document.getElementById('createModal').classList.remove('open');
  };

  window.createPromo = async function() {
    const code = document.getElementById('fCode').value.trim().toUpperCase();
    const discount = parseInt(document.getElementById('fDiscount').value);
    const limit = document.getElementById('fLimit').value;
    const expires = document.getElementById('fExpires').value;
    const is_active = document.getElementById('fActive').checked;

    if (!code || !discount) { showToast('Заполните код и скидку', 'error'); return; }
    if (discount < 1 || discount > 100) { showToast('Скидка должна быть от 1 до 100%', 'error'); return; }

    const body = {
      code,
      discount_percent: discount,
      is_active,
      usage_limit: limit ? parseInt(limit) : null,
      expires_at: expires ? new Date(expires).toISOString() : null
    };

    const res = await apiFetch('/api/admin/promo-codes', { method: 'POST', body: JSON.stringify(body) });
    if (res.ok) {
      closeCreateModal();
      loadPromos();
      showToast('Промокод ' + code + ' создан!', 'success');
    } else {
      const err = await res.json().catch(() => ({}));
      showToast(err.detail || 'Ошибка создания', 'error');
    }
  };

  document.getElementById('fCode').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });

  enableOverlayClose(document.getElementById('createModal'), closeCreateModal);

  loadPromos();
</script>
</body>
</html>
