<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTEMPLS Admin — Заказы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">XTEMPLS</div>
    <div class="sidebar-label">Навигация</div>
    <a class="nav-item" href="dashboard.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Дашборд
    </a>
    <a class="nav-item" href="products.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Товары
    </a>
    <a class="nav-item" href="categories.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
      </svg>
      Категории
    </a>
    <a class="nav-item active" href="orders.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      Заказы
      <span class="badge badge-red" id="newOrdersBadge" style="margin-left:auto;display:none;"></span>
    </a>
    <a class="nav-item" href="users.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Администраторы
    </a>
    <div class="sidebar-bottom">
      <div class="admin-badge">
        <div class="admin-avatar" id="adminInitial">A</div>
        <div>
          <div class="admin-name" id="adminLogin">Admin</div>
          <div class="admin-role">Администратор</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Заказы</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <!-- Status filter -->
        <select class="search-input" id="statusFilter" onchange="filterByStatus()" style="width:auto;padding-right:28px;">
          <option value="">Все статусы</option>
          <option value="new">Новые</option>
          <option value="in_progress">В работе</option>
          <option value="done">Выполнено</option>
          <option value="cancelled">Отменено</option>
        </select>
        <!-- Broadcast button -->
        <button class="btn btn-secondary" onclick="openBroadcastModal()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.7A2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.09 7.91a16 16 0 006 6l.27-.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Рассылка
        </button>
      </div>
    </div>

    <div class="page-content" style="padding:0">
      <div class="table-card" style="border-radius:0;border-left:none;border-right:none;border-bottom:none;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Покупатель</th>
                <th>Контакт</th>
                <th>Товары</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Дата</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="ordersTable">
              <tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:40px">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="orderModalTitle">Заказ</div>
      <button class="modal-close" onclick="closeOrderModal()">✕</button>
    </div>
    <div class="modal-body" id="orderModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeOrderModal()">Закрыть</button>
    </div>
  </div>
</div>

<!-- Broadcast Modal -->
<div class="modal-overlay" id="broadcastModal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <div class="modal-title">📢 Рассылка пользователям</div>
      <button class="modal-close" onclick="closeBroadcastModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="broadcastStats" style="margin-bottom:16px;padding:12px;background:var(--elevated);border-radius:var(--radius-sm);font-size:13px;color:var(--text-sec);">
        Загрузка статистики...
      </div>
      <div class="form-group">
        <label class="form-label">Текст сообщения (HTML разметка поддерживается)</label>
        <textarea class="form-textarea" id="broadcastText" style="min-height:140px;"
          placeholder="🛍 Новая коллекция уже в магазине!\n\nЗаходи и смотри новинки!"></textarea>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
        Поддерживается: &lt;b&gt;жирный&lt;/b&gt;, &lt;i&gt;курсив&lt;/i&gt;, &lt;a href=""&gt;ссылка&lt;/a&gt;
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeBroadcastModal()">Отмена</button>
      <button class="btn btn-primary" id="sendBroadcastBtn" onclick="sendBroadcast()">
        📨 Отправить рассылку
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  requireAuth();
  loadAdminInfo();

  let currentPage = 1;
  let totalPages = 1;
  let currentStatus = '';

  const STATUS_MAP = {
    'new':         ['badge-red',    'Новый'],
    'in_progress': ['badge-yellow', 'В работе'],
    'done':        ['badge-green',  'Выполнен'],
    'cancelled':   ['badge-gray',   'Отменён'],
  };

  function statusBadge(status) {
    const [cls, label] = STATUS_MAP[status] || ['badge-gray', status];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  async function loadOrders() {
    const params = new URLSearchParams({ page: currentPage, per_page: 20 });
    if (currentStatus) params.append('status', currentStatus);

    const res = await apiFetch(`/api/admin/orders?${params}`);
    if (!res.ok) return;
    const data = await res.json();
    totalPages = data.pages;

    const tbody = document.getElementById('ordersTable');
    if (data.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:40px">Нет заказов</td></tr>';
    } else {
      tbody.innerHTML = data.items.map(o => {
        const total = o.items.reduce((s, i) => s + Number(i.product_price) * i.quantity, 0);
        const itemsStr = o.items.map(i => `${i.product_name}${i.size ? ' (' + i.size + ')' : ''} ×${i.quantity}`).join(', ');
        const date = new Date(o.created_at).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `
          <tr style="cursor:pointer;" onclick="viewOrder(${o.id})">
            <td><strong>#${o.id}</strong></td>
            <td>${o.customer_name}</td>
            <td style="color:var(--accent)">${o.customer_contact}</td>
            <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:var(--text-sec)">${itemsStr}</td>
            <td><strong>${fmt(total)}</strong></td>
            <td>${statusBadge(o.status)}</td>
            <td style="white-space:nowrap;font-size:12px;color:var(--text-muted)">${date}</td>
            <td>
              <div style="display:flex;gap:4px;" onclick="event.stopPropagation()">
                <select class="form-select" style="width:auto;font-size:11px;padding:4px 6px;"
                  onchange="changeStatus(${o.id}, this.value)">
                  <option value="">— статус —</option>
                  <option value="new">Новый</option>
                  <option value="in_progress">В работе</option>
                  <option value="done">Выполнен</option>
                  <option value="cancelled">Отменён</option>
                </select>
                <button class="btn btn-danger btn-icon" onclick="deleteOrd(${o.id})" title="Удалить">🗑</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    renderPagination();
  }

  function renderPagination() {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
        html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
      } else if (Math.abs(i - currentPage) === 3) {
        html += `<span style="color:var(--text-muted);padding:0 4px">…</span>`;
      }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pag.innerHTML = html;
  }

  window.goPage = function(p) {
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    loadOrders();
  };

  window.filterByStatus = function() {
    currentStatus = document.getElementById('statusFilter').value;
    currentPage = 1;
    loadOrders();
  };

  window.changeStatus = async function(id, status) {
    if (!status) return;
    const res = await apiFetch(`/api/admin/orders/${id}/status`, {
      method: 'PUT',
      body: JSON.stringify({ status })
    });
    if (res.ok) {
      showToast('Статус обновлён', 'success');
      loadOrders();
    } else {
      showToast('Ошибка', 'error');
    }
  };

  window.viewOrder = async function(id) {
    const res = await apiFetch(`/api/admin/orders/${id}`);
    if (!res.ok) return;
    const o = await res.json();

    const total = o.items.reduce((s, i) => s + Number(i.product_price) * i.quantity, 0);
    const date = new Date(o.created_at).toLocaleString('ru-RU');
    document.getElementById('orderModalTitle').textContent = `Заказ #${o.id}`;
    document.getElementById('orderModalBody').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;">Покупатель</div>
          <div style="font-weight:600;">${o.customer_name}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;">Контакт</div>
          <div style="color:var(--accent);font-weight:600;">${o.customer_contact}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;">Статус</div>
          <div>${statusBadge(o.status)}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;">Дата</div>
          <div style="font-size:13px;color:var(--text-sec);">${date}</div>
        </div>
        ${o.comment ? `
        <div style="grid-column:1/-1;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:4px;">Комментарий</div>
          <div style="color:var(--text-sec);font-size:13px;">${o.comment}</div>
        </div>` : ''}
      </div>
      <div style="border-top:1px solid var(--border);padding-top:16px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:12px;">Позиции</div>
        ${o.items.map(i => `
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <span style="color:var(--text-sec);">${i.product_name}${i.size ? ' <span style="color:var(--accent)">[' + i.size + ']</span>' : ''} × ${i.quantity}</span>
            <span style="font-weight:700;color:var(--accent)">${fmt(Number(i.product_price) * i.quantity)}</span>
          </div>
        `).join('')}
        <div style="display:flex;justify-content:flex-end;margin-top:12px;font-size:16px;font-weight:800;">
          Итого: <span style="color:var(--accent);margin-left:8px;">${fmt(total)}</span>
        </div>
      </div>
    `;
    document.getElementById('orderModal').classList.add('open');
  };

  window.closeOrderModal = function() {
    document.getElementById('orderModal').classList.remove('open');
  };

  window.deleteOrd = function(id) {
    if (!confirm(`Удалить заказ #${id}?`)) return;
    apiFetch(`/api/admin/orders/${id}`, { method: 'DELETE' }).then(res => {
      if (res.ok || res.status === 204) {
        showToast('Заказ удалён', 'success');
        loadOrders();
      }
    });
  };

  // Close on overlay click
  document.getElementById('orderModal').addEventListener('click', function(e) {
    if (e.target === this) closeOrderModal();
  });

  // ── Broadcast ──────────────────────────────────────────────────────────────

  window.openBroadcastModal = async function() {
    document.getElementById('broadcastModal').classList.add('open');
    const res = await apiFetch('/api/admin/orders/stats');
    if (res.ok) {
      const data = await res.json();
      document.getElementById('broadcastStats').innerHTML =
        `👥 Пользователей бота: <strong>${data.tg_users}</strong> &nbsp;|&nbsp; Заказов всего: <strong>${data.total}</strong>`;
    }
  };

  window.closeBroadcastModal = function() {
    document.getElementById('broadcastModal').classList.remove('open');
  };

  window.sendBroadcast = async function() {
    const text = document.getElementById('broadcastText').value.trim();
    if (!text) { showToast('Введите текст', 'error'); return; }

    if (!confirm(`Отправить сообщение всем пользователям бота?`)) return;

    const btn = document.getElementById('sendBroadcastBtn');
    btn.disabled = true;
    btn.textContent = 'Постановка в очередь...';

    const res = await apiFetch('/api/admin/broadcast', {
      method: 'POST',
      body: JSON.stringify({ text })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      btn.disabled = false;
      btn.textContent = '📨 Отправить рассылку';
      showToast(err.detail || 'Ошибка рассылки', 'error');
      return;
    }

    const data = await res.json();
    btn.textContent = `Отправляется: 0/${data.queued}`;
    document.getElementById('broadcastText').value = '';

    // Poll progress until done
    const statsEl = document.getElementById('broadcastStats');
    const poll = async () => {
      try {
        const sRes = await apiFetch('/api/admin/broadcast/status');
        if (!sRes.ok) return;
        const s = await sRes.json();
        if (s.state === 'running' && statsEl) {
          statsEl.innerHTML = `⏳ Отправка... <strong>${s.sent}</strong> отправлено, <strong>${s.failed}</strong> ошибок из <strong>${s.total}</strong>`;
        }
        if (s.state === 'running') {
          setTimeout(poll, 1500);
        } else if (s.state === 'done') {
          btn.disabled = false;
          btn.textContent = '📨 Отправить рассылку';
          showToast(`Готово: отправлено ${s.sent}, ошибок ${s.failed}`, 'success');
          if (statsEl) {
            statsEl.innerHTML = `✅ Отправлено: <strong>${s.sent}</strong>, ошибок: <strong>${s.failed}</strong> из <strong>${s.total}</strong>`;
          }
        }
      } catch (e) { setTimeout(poll, 2000); }
    };
    setTimeout(poll, 1500);
  };

  document.getElementById('broadcastModal').addEventListener('click', function(e) {
    if (e.target === this) closeBroadcastModal();
  });

  // Load new orders badge
  async function loadBadge() {
    const res = await apiFetch('/api/admin/orders/stats');
    if (res.ok) {
      const data = await res.json();
      const badge = document.getElementById('newOrdersBadge');
      if (data.new > 0) {
        badge.textContent = data.new;
        badge.style.display = 'inline-flex';
      }
    }
  }

  loadBadge();
  loadOrders();
</script>
</body>
</html>
