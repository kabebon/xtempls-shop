<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XTEMPLS Admin — Дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=1.0.1" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">XTEMPLS</div>
    <div class="sidebar-label">Навигация</div>
    <a class="nav-item active" href="dashboard.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Дашборд
    </a>
    <a class="nav-item" href="products.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      Товары
    </a>
    <a class="nav-item" href="categories.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
      </svg>
      Категории
    </a>
    <a class="nav-item" href="orders.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
      </svg>
      Заказы
    </a>
    <a class="nav-item" href="trash.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
      </svg>
      Корзина
    </a>
    <a class="nav-item" href="users.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Администраторы
    </a>
    <div class="sidebar-bottom">
      <div class="admin-badge">
        <div class="admin-avatar" id="adminInitial">A</div>
        <div>
          <div class="admin-name" id="adminLogin">Admin</div>
          <div class="admin-role">Администратор</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Дашборд</div>
      <a href="/" target="_blank" class="btn btn-secondary">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Открыть магазин
      </a>
    </div>

    <div class="page-content">
      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--accent-dim); font-size:20px;">📦</div>
          <div class="stat-value" id="totalProducts">—</div>
          <div class="stat-label">Всего товаров</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--success-dim); font-size:20px;">✅</div>
          <div class="stat-value" style="color:var(--success)" id="inStockProducts">—</div>
          <div class="stat-label">В наличии</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--danger-dim); font-size:20px;">❌</div>
          <div class="stat-value" style="color:var(--danger)" id="outProducts">—</div>
          <div class="stat-label">Нет в наличии</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--blue-dim); font-size:20px;">🏷</div>
          <div class="stat-value" style="color:var(--blue)" id="totalCategories">—</div>
          <div class="stat-label">Категорий</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="location.href='orders.html'">
          <div class="stat-icon" style="background: rgba(251,191,36,0.1); font-size:20px;">📋</div>
          <div class="stat-value" style="color:var(--warning)" id="newOrders">—</div>
          <div class="stat-label">Новых заказов</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background: var(--blue-dim); font-size:20px;">👥</div>
          <div class="stat-value" style="color:var(--blue)" id="tgUsers">—</div>
          <div class="stat-label">Подписчиков бота</div>
        </div>
      </div>

      <!-- Recent Products -->
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Последние товары</div>
          <a href="products.html" class="btn btn-secondary">Все товары →</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Фото</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Цена</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id="recentProducts">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  requireAuth();
  loadAdminInfo();

  async function loadDashboard() {
    try {
      const [prodRes, catRes, ordersRes] = await Promise.all([
        apiFetch('/api/admin/products?per_page=100'),
        apiFetch('/api/admin/categories'),
        apiFetch('/api/admin/orders/stats')
      ]);

      if (!prodRes.ok || !catRes.ok) return;

      const products = await prodRes.json();
      const categories = await catRes.json();

      document.getElementById('totalProducts').textContent = products.total;
      document.getElementById('inStockProducts').textContent =
        products.items.filter(p => p.stock_status === 'in_stock').length;
      document.getElementById('outProducts').textContent =
        products.items.filter(p => p.stock_status === 'out_of_stock').length;
      document.getElementById('totalCategories').textContent = categories.length;

      if (ordersRes.ok) {
        const ordersData = await ordersRes.json();
        document.getElementById('newOrders').textContent = ordersData.new;
        document.getElementById('tgUsers').textContent = ordersData.tg_users;
      }


      const tbody = document.getElementById('recentProducts');
      const recent = products.items.slice(0, 8);
      if (recent.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px">Нет товаров</td></tr>';
      } else {
        tbody.innerHTML = recent.map(p => `
          <tr>
            <td>
              ${p.primary_image
                ? `<img src="${p.primary_image}" class="product-thumb" />`
                : `<div class="product-thumb-placeholder">🛍</div>`}
            </td>
            <td><strong>${p.name}</strong></td>
            <td>${p.category_id ? (categories.find(c => c.id === p.category_id)?.name || '—') : '—'}</td>
            <td>${fmt(p.price)}</td>
            <td>${stockBadge(p.stock_status)}</td>
          </tr>
        `).join('');
      }
    } catch (e) {
      console.error(e);
    }
  }

  loadDashboard();
</script>
</body>
</html>
