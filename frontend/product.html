<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>XTEMPLS — Товар</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Playfair+Display&subset=all&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Geologica&subset=all&display=swap">
  <link rel="stylesheet" href="style.css?v=1.0.9" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- Back Button -->
<button class="back-btn" id="backBtn">
  <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
  </svg>
  <span class="back-btn-text">Назад</span>
</button>

<div class="product-page-container">
  <div class="product-left-col">
    <!-- Gallery -->
    <div class="product-gallery" id="gallery">
      <div class="card-placeholder" id="galleryPlaceholder">🛍</div>
      <img id="galleryMain" class="gallery-img" style="display:none;" alt="" />
      <div class="gallery-dots" id="galleryDots"></div>
    </div>

    <!-- Thumbnails -->
    <div class="gallery-thumbs" id="galleryThumbs"></div>
  </div>

  <div class="product-right-col">
    <!-- Detail -->
    <div class="product-detail">
      <!-- Category -->
      <div id="categoryChip" style="display:none;" class="category-chip">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/>
        </svg>
        <span id="categoryName"></span>
      </div>

      <div class="detail-header">
        <h1 class="detail-name" id="productName">Загрузка...</h1>
      </div>

      <div class="detail-prices" id="detailPrices"></div>

      <!-- Stock -->
      <div id="stockIndicator" class="stock-indicator"></div>

      <!-- Sizes -->
      <div id="sizesBlock" style="display:none;">
        <div class="sizes-label">Размер</div>
        <div class="sizes-grid" id="sizesGrid"></div>
      </div>
      <button class="size-chart-link" id="sizeChartLink" style="display:none;">📏 Размерная сетка</button>

      <div class="divider"></div>

      <!-- Description -->
      <div id="descBlock" style="display:none;">
        <div class="detail-desc-label">Описание</div>
        <div class="detail-desc" id="productDesc"></div>
        <div class="divider"></div>
      </div>

      <!-- CTA -->
      <div id="ctaBlock" style="display:none; padding-bottom: 30px;">
        <button class="btn-checkout" id="addToCartBtn">
          🛒 Добавить в корзину
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="app.js?v=1.0.9"></script>
</body>
</html>
